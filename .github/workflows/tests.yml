name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Instala dependências
        run: pip install -r requirements.txt

      - name: Config de teste
        run: cp config.example.py config.py

      - name: Roda testes
        run: pytest
