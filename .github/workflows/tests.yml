name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Instala dependências
        run: pip install -r requirements.txt

      - name: Config de teste
        run: cp config.example.py config.py

      - name: Roda testes
        run: pytest
        env:
          # pyautogui checa DISPLAY no import (Linux/X11) mesmo com o
          # screenshot() mockado no teste — sem isso quebra com KeyError antes
          # do mock entrar em ação. Fake value basta, screenshot real nunca roda.
          DISPLAY: ":99"
